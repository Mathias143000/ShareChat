name: share-chat-ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Smoke
        run: npm run smoke

      - name: Install flow
        run: npm run test:install

  compose-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment
        run: node scripts/bootstrap-env.js

      - name: Validate compose config
        run: docker compose config

      - name: Start stack
        run: docker compose up -d --build

      - name: Run compose smoke
        run: node scripts/compose-smoke.js

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          node scripts/collect-logs.js
          docker compose ps
          docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v --remove-orphans
