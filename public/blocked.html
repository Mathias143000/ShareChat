<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Доступ ограничен — ShareChat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --card: #0f172a;
      --text: #e5e7eb;
      --muted: #9aa4b2;
      --border: #334155;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #162033 0%, var(--bg) 58%);
      color: var(--text);
      font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .blocked-card {
      width: min(100%, 520px);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
    }

    .emoji {
      font-size: 32px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p, .muted {
      margin: 0;
      color: var(--muted);
    }

    .ip-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 18px 0 12px;
    }

    code {
      flex: 1;
      min-height: 44px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(11, 18, 32, 0.9);
      color: var(--accent);
      font: 600 15px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #111827;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .btn:hover {
      border-color: #475569;
      background: #162033;
    }

    .muted {
      margin-top: 4px;
      font-size: 14px;
    }

    @media (max-width: 560px) {
      .ip-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="blocked-card">
    <div class="emoji">🔒</div>
    <h1>Доступ ограничен</h1>
    <p>Ваш IP не включён в список доступа. Скопируйте IP и отправьте администратору.</p>
    <div class="ip-row">
      <code id="ipVal">—</code>
      <button id="copyIP" class="btn" type="button">Скопировать IP</button>
    </div>
    <div class="muted">Если список пуст — доступ открыт для всех.</div>
  </div>
<script>
(async ()=>{
  const el=document.getElementById('ipVal');
  try{ const r=await fetch('/api/ip',{cache:'no-store'}); const j=await r.json(); el.textContent=j.ip||'—'; }catch(_){}
  document.getElementById('copyIP').addEventListener('click', async ()=>{
    const text=el.textContent||'';
    try{
      if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); }
      else{ const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;left:-9999px;top:0;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
      const btn=document.getElementById('copyIP'); const old=btn.textContent; btn.textContent='Скопировано'; setTimeout(()=>btn.textContent=old,1200);
    }catch(_){}
  });
})();
</script>
</body>
</html>
