groups:
  - name: sharechat
    rules:
      - alert: ShareChatReplicaDown
        expr: up{job=~"sharechat-app-.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "A ShareChat replica is down"
          description: "One of the ShareChat application replicas is not being scraped by Prometheus."

      - alert: ShareChatUploadFailuresDetected
        expr: increase(sharechat_upload_failures_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Upload failures detected"
          description: "The application has reported upload failures in the last 10 minutes."

      - alert: ShareChatRateLimitHitsDetected
        expr: increase(sharechat_rate_limit_hits_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Rate limits are being hit"
          description: "One or more ShareChat rate limit scopes were triggered in the last 10 minutes."
