global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: sharechat-app-1
    metrics_path: /api/metrics
    static_configs:
      - targets: ["app1:3000"]

  - job_name: sharechat-app-2
    metrics_path: /api/metrics
    static_configs:
      - targets: ["app2:3000"]
