name: share-chat

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "until mc alias set local http://minio:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\"; do sleep 2; done && mc mb -p local/sharechat || true",
      ]

  app1:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_NODE_NAME: app-1
      PORT: 3000
      PUBLIC_ORIGIN: http://127.0.0.1:18300
      ALLOWED_ORIGINS: http://127.0.0.1:18300,http://127.0.0.1:18301,http://127.0.0.1:18302
      DATA_DIR: /app/data
      UPLOADS_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      STORAGE_S3_BUCKET: sharechat
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_PREFIX: uploads/
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      SOCKET_TRANSPORTS: websocket
      UPLOAD_CLEANUP_INTERVAL_MINUTES: 10
      MAX_TOTAL_UPLOADS_MB: 256
    ports:
      - "18301:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15

  app2:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_NODE_NAME: app-2
      PORT: 3000
      PUBLIC_ORIGIN: http://127.0.0.1:18300
      ALLOWED_ORIGINS: http://127.0.0.1:18300,http://127.0.0.1:18301,http://127.0.0.1:18302
      DATA_DIR: /app/data
      UPLOADS_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: minio
      STORAGE_S3_BUCKET: sharechat
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_PREFIX: uploads/
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      SOCKET_TRANSPORTS: websocket
      UPLOAD_CLEANUP_INTERVAL_MINUTES: 10
      MAX_TOTAL_UPLOADS_MB: 256
    ports:
      - "18302:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 15

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    ports:
      - "18300:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      alertmanager:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --cluster.listen-address=
    ports:
      - "19093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana-oss:11.5.2
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      alertmanager:
        condition: service_started
    ports:
      - "13170:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin12345
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  minio-data:
